name: Build and Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub release (only for manual builds)'
        type: boolean
        default: false
      submit_to_amo:
        description: 'Submit to AMO for public distribution'
        type: boolean
        default: false
      channel:
        description: 'AMO submission channel'
        type: choice
        options:
          - listed
          - unlisted
        default: listed

permissions:
  contents: write

jobs:
  build:
    uses: evanwon/browser-extension-workflows/.github/workflows/build-release.yml@v1
    with:
      extension-name: gr-shelf-position-editor
      extension-display-name: "Goodreads Shelf Position Editor"
      extension-description: "View and edit your To Read shelf position directly on Goodreads book pages."
      manifest-version: 3
      lint-warnings-as-errors: false
      validate-tag-matches-manifest: false
      amo-submission-enabled: ${{ vars.AMO_SUBMISSION_ENABLED == 'true' }}
      issues-url: "https://github.com/evanwon/goodreads-shelf-position-editor/issues"
      amo-url: ""
      firefox-min-version: "109+"
      permissions-description: "storage, host permissions for goodreads.com"
      create-release: ${{ github.event.inputs.create_release == 'true' }}
      submit-to-amo: ${{ github.event.inputs.submit_to_amo == 'true' }}
      channel: ${{ github.event.inputs.channel || 'listed' }}
    secrets: inherit
